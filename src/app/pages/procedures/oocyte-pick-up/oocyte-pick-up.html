<div class="row mt-3">
    <div class="col-12">
        <div class="card shadow-sm border-0 section-card">
            <div class="card-header blue-header">
                Patient Information
            </div>
            <div class="card-body">
                <div class="row g-3">
                    <div class="col-md-6">
                        <label for="name" class="form-label">Name </label>
                        <input type="text" class="form-control" id="name" [(ngModel)]="procedure.patient.name"
                            #name="ngModel" name="name" disabled>
                    </div>
                    <div class="col-md-6">
                        <label for="nationalId" class="form-label">National ID</label>
                        <input type="text" class="form-control" id="nationalId"
                            [(ngModel)]="procedure.patient.nationalId" #nationalId="ngModel" name="nationalId" disabled>
                    </div>
                    <div class="col-md-6">
                        <label for="phoneNumber" class="form-label">Phone Number</label>
                        <input type="text" class="form-control" id="phoneNumber"
                            [(ngModel)]="procedure.patient.phoneNumber" #phoneNumber="ngModel" name="phoneNumber"
                            disabled>
                    </div>
                    <div class="col-md-6">
                        <label for="age" class="form-label">Age</label>
                        <input type="text" class="form-control" id="age" [(ngModel)]="procedure.patient.age"
                            #age="ngModel" name="age" disabled>
                    </div>
                    <div class="col-md-6">
                        <label for="husbandName" class="form-label">Husband's Name</label>
                        <input type="text" class="form-control" id="husbandName"
                            [(ngModel)]="procedure.patient.husbandName" #husbandname="ngModel" name="husbandname"
                            disabled>
                    </div>
                    <div class="col-md-6">
                        <label for="husbandNationalId" class="form-label">Husband's ID</label>
                        <input type="text" class="form-control" id="husbandId"
                            [(ngModel)]="procedure.patient.husbandNationalId" #husbandNationalId="ngModel"
                            name="husbandNationalId" disabled>
                    </div>
                    <div class="col-md-6">
                        <label for="husbandPhoneNumber" class="form-label">Husband Phone Number</label>
                        <input type="text" class="form-control" id="husbandPhoneNumber"
                            [(ngModel)]="procedure.patient.husbandPhoneNumber" #husbandPhoneNumber="ngModel"
                            name="husbandPhoneNumber" disabled>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<div class="row mt-3">
    <div class="col-12">
        <div class="card shadow-sm border-0 section-card">
            <div class="card-header blue-header">
                Physician & Embryologist Information
            </div>
            <div class="card-body">
                <div class="row g-3">
                    <div class="col-md-6">
                        <label for="physician" class="form-label">Physician</label>
                        <input type="text" class="form-control" id="physician" [(ngModel)]="procedure.physician.name"
                            #physician="ngModel" name="physician" disabled>
                    </div>
                    <div class="col-md-6">
                        <label for="embryologist" class="form-label">Embryologist</label>
                        <input type="text" class="form-control" id="physician" [(ngModel)]="procedure.embryologist.name"
                            #embryologist="ngModel" name="embryologist" disabled>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<div class="row mt-3">
    <div class="col-12">
        <div class="card shadow-sm border-0 section-card">
            <div class="card-header blue-header">
                Treatment Information
            </div>
            <div class="card-body">
                <div class="row g-3">
                    <div class="col-md-3">
                        <label class="form-label">Treatment</label>
                        <select class="form-select" [(ngModel)]="procedure.values['treatment']" name="treatment">
                            <option value="ICSI">ICSI</option>
                            <option value="IVF">IVF</option>
                            <option value="EGG FREEZIN">EGG FREEZING</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Aspiration Date</label>
                        <input type="date" class="form-control" [(ngModel)]="procedure.values['aspirationDate']"
                            name="aspirationDate">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Start Time</label>
                        <input type="time" class="form-control" [(ngModel)]="procedure.values['startTime']"
                            name="startTime">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">End Time</label>
                        <input type="time" class="form-control" [(ngModel)]="procedure.values['endTime']"
                            name="endTime">
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div class="col-12">
        <div class="card shadow-sm border-0 section-card">
            <div class="card-header blue-header">
                Egg Collection &amp; Culture
            </div>

                <div class="row g-3">
                    <div class="col-md-3">
                        <label class="form-label">No of Eggs</label>
                        <input type="number" class="form-control" [(ngModel)]="procedure.values['numberOfEggs']"
                            name="numberOfEggs">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">GV</label>
                        <input type="text" class="form-control" [(ngModel)]="procedure.values['gv']" name="gv">
                    </div>

                        <label class="form-label">MII</label>
                        <input type="text" class="form-control" [(ngModel)]="procedure.values['mii']" name="mii">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Injected</label>

                            name="injected">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Empty Egg</label>
                        <input type="text" class="form-control" [(ngModel)]="procedure.values['emptyEgg']"

                    </div>

                        <label class="form-label">Atretic</label>
                        <input type="text" class="form-control" [(ngModel)]="procedure.values['atretic']"

                    </div>
                    <div class="col-md-3">

                        <input type="text" class="form-control" [(ngModel)]="procedure.values['abnormal']"
                            name="abnormal">

<div class="row mt-3">
    <div class="col-12">
        <div class="card shadow-sm border-0 section-card">
            <div class="card-header blue-header">Semen Analysis &amp; Preparation</div>

            <div class="card-body">
                <div class="row g-3">

                    <div class="col-md-3">
                        <label class="form-label">Ejaculation Time</label>
                        <input type="time" class="form-control" [(ngModel)]="procedure.values['ejaculationTime']"
                            name="ejaculationTime">
                    </div>

                    <div class="col-md-3">
                        <label class="form-label">Delivery Time</label>
                        <input type="time" class="form-control" [(ngModel)]="procedure.values['deliveryTime']"
                            name="deliveryTime">
                    </div>

                    <div class="col-md-3">
                        <label class="form-label">Analysis Time</label>
                        <input type="time" class="form-control" [(ngModel)]="procedure.values['analysisTime']"
                            name="analysisTime">
                    </div>

                    <div class="col-md-3">
                        <label class="form-label">Preparation</label>
                        <input type="text" class="form-control" [(ngModel)]="procedure.values['preparation']"
                            name="preparation">
                    </div>

                    <div class="col-md-3">
                        <label class="form-label">Volume (ml)</label>
                        <input type="text" class="form-control" [(ngModel)]="procedure.values['semenVolume']"
                            name="semenVolume">
                    </div>

                    <div class="col-md-3">
                        <label class="form-label">Analyzed By</label>
                        <select class="form-select" [(ngModel)]="procedure.values['analyzedBy']" name="analyzedBy">
                            <option value="">Select</option>
                        </select>
                    </div>

                    <div class="col-md-3">
                        <label class="form-label">Witness</label>
                        <select class="form-select" [(ngModel)]="procedure.values['semenWitness']" name="semenWitness">
                            <option value="">Select</option>
                        </select>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Comment</label>
